<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashverse</title>
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        script-src 'self'
            https://www.gstatic.com/firebasejs/
            'unsafe-inline';
        style-src 'unsafe-inline';
        connect-src 'self'
            https://dashverse-api-proxy.thondaladinne-masthan.workers.dev
            https://identitytoolkit.googleapis.com
            https://securetoken.googleapis.com
            https://firestore.googleapis.com
            https://www.googleapis.com;
        img-src 'self' data:;
        font-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'none';
    ">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex;
            justify-content: center; align-items: center; padding: 20px;
        }
        .auth-container {
            background: white; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden; max-width: 1000px; width: 100%;
            display: flex; min-height: 600px;
        }
        .left-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px; color: white; flex: 1;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .logo {
            width: 150px; height: 150px; margin-bottom: 30px;
            animation: float 3s ease-in-out infinite; object-fit: contain;
        }
        .logo-fallback {
            width: 150px; height: 150px; margin-bottom: 30px;
            background: rgba(255,255,255,0.2); border-radius: 20px;
            display: none; align-items: center; justify-content: center;
            font-size: 4rem; animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .brand-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 15px; }
        .brand-subtitle { font-size: 1.1rem; opacity: 0.9; }
        .right-section {
            flex: 1; padding: 60px 50px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .form-header { margin-bottom: 40px; }
        .form-header h2 { font-size: 2rem; color: #2c3e50; margin-bottom: 10px; }
        .form-header p { color: #6c757d; font-size: 1rem; }
        .form-group { margin-bottom: 25px; }
        .form-label { display: block; margin-bottom: 8px; color: #495057; font-weight: 500; }
        .form-input {
            width: 100%; padding: 14px 16px;
            border: 2px solid #e9ecef; border-radius: 8px;
            font-size: 1rem; transition: all 0.3s; color: #2c3e50;
        }
        .form-input:focus {
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        .form-input[aria-invalid="true"] { border-color: #dc3545; }
        .password-wrapper { position: relative; }
        .password-wrapper .form-input { padding-right: 50px; }
        .toggle-password {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #6c757d;
            padding: 4px; display: flex; align-items: center; justify-content: center;
        }
        .toggle-password svg {
            width: 22px; height: 22px; fill: none;
            stroke: currentColor; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .btn-primary {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .form-links { margin-top: 20px; text-align: center; }
        .form-links a { color: #667eea; text-decoration: none; font-weight: 500; }
        .form-links a:hover { color: #764ba2; text-decoration: underline; }
        .divider { margin: 20px 0; text-align: center; color: #adb5bd; }
        .alert {
            padding: 12px 16px; border-radius: 8px;
            margin-bottom: 20px; display: none; word-break: break-word;
        }
        .alert.show { display: block; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info  { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .loading-msg {
            text-align: center; padding: 10px; color: #667eea;
            font-size: 0.875rem; display: none;
        }
        .loading-msg.show { display: block; }
        .loading-msg.error-state { color: #dc3545; }
        .not-registered-banner {
            display: none; background: #fff3cd; border: 2px solid #ffc107;
            border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center;
        }
        .not-registered-banner.show { display: block; }
        .banner-title { font-size: 1.05rem; font-weight: 700; color: #856404; margin-bottom: 6px; }
        .banner-subtitle { font-size: 0.875rem; color: #6d5100; margin-bottom: 14px; line-height: 1.5; }
        .banner-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-create {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 10px 24px; border-radius: 8px;
            text-decoration: none; font-weight: 600; font-size: 0.95rem;
        }
        .btn-dismiss {
            background: transparent; color: #856404;
            padding: 10px 18px; border-radius: 8px;
            border: 2px solid #ffc107; font-weight: 600;
            font-size: 0.95rem; cursor: pointer; font-family: inherit;
        }
        @media (max-width: 768px) {
            .auth-container { flex-direction: column; }
            .left-section { padding: 40px 30px; }
            .logo { width: 100px; height: 100px; }
            .right-section { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="left-section" aria-hidden="true">
            <img src="dashtoon_logo.jpg" alt="" class="logo" id="logoImg">
            <div class="logo-fallback" id="logoFallback" aria-hidden="true">🎬</div>
            <h1 class="brand-title">Dashverse</h1>
            <p class="brand-subtitle">Content Management Platform</p>
        </div>
        <div class="right-section">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your account to continue</p>
            </div>
            <div class="loading-msg" id="loadingMsg" role="status" aria-live="polite"></div>
            <div class="alert alert-error" id="errorAlert" role="alert" aria-live="assertive"></div>
            <div class="alert alert-info"  id="infoAlert"  role="status" aria-live="polite"></div>
            <div class="not-registered-banner" id="notRegisteredBanner" role="alert" aria-live="polite">
                <div class="banner-title" id="bannerTitle"></div>
                <div class="banner-subtitle" id="bannerSubtitle"></div>
                <div class="banner-actions">
                    <a href="signup.html" class="btn-create">Create Account</a>
                    <button type="button" class="btn-dismiss" id="dismissBanner">Dismiss</button>
                </div>
            </div>
            <form id="loginForm" autocomplete="on" novalidate aria-label="Sign in form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-input" id="email"
                           placeholder="your@email.com" required autocomplete="email"
                           maxlength="254" aria-required="true">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="password"
                               placeholder="Enter your password" required
                               autocomplete="current-password" maxlength="128" aria-required="true">
                        <button type="button" class="toggle-password" id="togglePassword"
                                aria-label="Show password">
                            <svg id="eyeIcon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eyeOffIcon" viewBox="0 0 24 24" style="display:none" aria-hidden="true">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn" disabled>Sign In</button>
            </form>
            <div class="form-links"><a href="forgot-password.html">Forgot your password?</a></div>
            <div class="divider" aria-hidden="true">─────── or ───────</div>
            <div class="form-links">Don't have an account? <a href="signup.html">Create Account</a></div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';
            // Logo fallback
            var logoImg = document.getElementById('logoImg');
            logoImg.onerror = function () {
                logoImg.style.display = 'none';
                var fb = document.getElementById('logoFallback');
                fb.style.display = 'flex';
            };
            // Password toggle
            document.getElementById('togglePassword').addEventListener('click', function () {
                var input  = document.getElementById('password');
                var isPass = input.type === 'password';
                input.type = isPass ? 'text' : 'password';
                document.getElementById('eyeIcon').style.display    = isPass ? 'none' : '';
                document.getElementById('eyeOffIcon').style.display = isPass ? '' : 'none';
                this.setAttribute('aria-label', isPass ? 'Hide password' : 'Show password');
                input.focus();
            });
            // Dismiss banner
            document.getElementById('dismissBanner').addEventListener('click', function () {
                document.getElementById('notRegisteredBanner').classList.remove('show');
                document.getElementById('email').removeAttribute('aria-invalid');
            });
        })();
    </script>

    <script type="module">
        import {
            auth, db, ensureInitialized,
            signInWithEmailAndPassword, signOut,
            doc, getDoc, setDoc, serverTimestamp,
            SecureSession, RateLimiter, SecureLogger,
            isValidEmail, sanitizeInput, setTextSafe,
            verifyUserRoleFromFirestore, SECURITY,
        } from './firebase.js';

        // ── Rate limiter ────────────────────────────────────────────────────
        const loginLimiter = new RateLimiter('login');
        let firebaseReady  = false;
        let _loginInProgress = false;

        // ── DOM refs ────────────────────────────────────────────────────────
        const loginForm      = document.getElementById('loginForm');
        const loginBtn       = document.getElementById('loginBtn');
        const emailInput     = document.getElementById('email');
        const passwordInput  = document.getElementById('password');
        const errorAlert     = document.getElementById('errorAlert');
        const infoAlert      = document.getElementById('infoAlert');
        const loadingMsg     = document.getElementById('loadingMsg');
        const banner         = document.getElementById('notRegisteredBanner');
        const bannerTitle    = document.getElementById('bannerTitle');
        const bannerSubtitle = document.getElementById('bannerSubtitle');

        // ── Alert helpers ───────────────────────────────────────────────────
        function showError(message) {
            hideAllAlerts();
            errorAlert.textContent = message;
            errorAlert.classList.add('show');
            // Auto-hide after 8 s
            setTimeout(() => errorAlert.classList.remove('show'), 8000);
        }

        function showInfo(message) {
            hideAllAlerts();
            infoAlert.textContent = message;
            infoAlert.classList.add('show');
        }

        function showBanner(title, subtitle) {
            hideAllAlerts();
            bannerTitle.textContent    = title;
            bannerSubtitle.textContent = subtitle;
            emailInput.setAttribute('aria-invalid', 'true');
            banner.classList.add('show');
        }

        function hideAllAlerts() {
            errorAlert.classList.remove('show');
            infoAlert.classList.remove('show');
            banner.classList.remove('show');
            emailInput.removeAttribute('aria-invalid');
        }

        function setLoading(message, isError = false) {
            loadingMsg.textContent = message;
            loadingMsg.classList.toggle('error-state', isError);
            loadingMsg.classList.add('show');
        }
        function hideLoading() { loadingMsg.classList.remove('show'); }

        // ── Firebase init ───────────────────────────────────────────────────
        async function waitForFirebase() {
            setLoading('⏳ Connecting to server...');
            loginBtn.disabled = true;
            try {
                await ensureInitialized();
                firebaseReady     = true;
                hideLoading();
                loginBtn.disabled = false;
            } catch (err) {
                setLoading('❌ Failed to connect.', true);
                const retryBtn = document.createElement('button');
                retryBtn.className   = 'btn-primary';
                retryBtn.style.cssText = 'width:auto;padding:6px 16px;margin-top:8px;font-size:0.875rem;';
                retryBtn.textContent = '🔄 Retry';
                retryBtn.type        = 'button';
                retryBtn.addEventListener('click', () => location.reload());
                loadingMsg.appendChild(document.createElement('br'));
                loadingMsg.appendChild(retryBtn);
            }
        }

        waitForFirebase();

        // ── Input change listeners ──────────────────────────────────────────
        emailInput.addEventListener('input',    hideAllAlerts);
        passwordInput.addEventListener('input', () => errorAlert.classList.remove('show'));

        // ── Form submit ─────────────────────────────────────────────────────
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (_loginInProgress) return;
            hideAllAlerts();

            if (!firebaseReady) {
                showError('Still connecting. Please wait and try again.');
                return;
            }

            if (!loginLimiter.canProceed()) {
                const wait = Math.ceil(loginLimiter.getWaitTime() / 1000);
                showError(`Too many login attempts. Please wait ${wait} seconds.`);
                return;
            }

            const email    = sanitizeInput(emailInput.value, 254).toLowerCase();
            const password = passwordInput.value.substring(0, SECURITY.MAX_PASSWORD_LENGTH);

            if (!email || !isValidEmail(email)) {
                showError('Please enter a valid email address.');
                return;
            }
            if (!password || password.length < 6) {
                showError('Please enter your password (minimum 6 characters).');
                return;
            }

            _loginInProgress     = true;
            loginBtn.disabled    = true;
            loginBtn.textContent = 'Signing in…';

            try {
                // ── 1. Firebase Auth ────────────────────────────────────────
                const credential = await signInWithEmailAndPassword(auth, email, password);
                const user = credential.user;

                if (!user.emailVerified) {
                    showError('Please verify your email before signing in. Check your inbox.');
                    await signOut(auth).catch(() => {});
                    return;
                }

                // ── 2. Role determination ───────────────────────────────────
                let role = null;
                try {
                    role = await verifyUserRoleFromFirestore(user.uid, email);
                } catch (roleErr) {
                    SecureLogger.warn('Firestore role check failed, using email domain fallback');
                }

                // Fallback: email domain
                if (!role) {
                    if (email.endsWith('@dashverse.ai')) {
                        role = 'admin';
                    } else {
                        await signOut(auth).catch(() => {});
                        showBanner(
                            'Account Not Found',
                            'Your writer account is not yet configured. Please contact your admin or create a new account.'
                        );
                        return;
                    }
                }

                if (!SECURITY.VALID_ROLES.includes(role)) {
                    await signOut(auth).catch(() => {});
                    showError('Account role is invalid. Please contact support.');
                    return;
                }

                // ── 3. Record login timestamp (non-blocking) ────────────────
                try {
                    const col = role === 'admin' ? 'admins' : 'writers';
                    await setDoc(doc(db, col, user.uid), {
                        lastLogin:     serverTimestamp(),
                        emailVerified: true,
                    }, { merge: true });
                } catch (dbErr) {
                    SecureLogger.warn('Could not update lastLogin');
                }

                // ── 4. Create secure session (FIXED: now awaited properly) ──
                // createSession is async and generates the new kv:2 HMAC key
                showInfo('🔐 Securing session…');
                let sessionToken;
                try {
                    sessionToken = await SecureSession.createSession(user.uid);
                } catch (sessionErr) {
                    SecureLogger.error('Session creation failed');
                    await signOut(auth).catch(() => {});
                    showError('Failed to create secure session. Please try again.');
                    return;
                }

                if (!sessionToken) {
                    await signOut(auth).catch(() => {});
                    showError('Session token missing. Please try again.');
                    return;
                }

                // ── 5. Store user data ──────────────────────────────────────
                const displayName = sanitizeInput(
                    user.displayName || email.split('@')[0], 100
                );
                try {
                    await SecureSession.setUserData({
                        uid:   user.uid,
                        name:  displayName,
                        email: email,
                        role:  role,
                    });
                } catch (dataErr) {
                    SecureLogger.error('Failed to store user data');
                    await signOut(auth).catch(() => {});
                    showError('Failed to store session data. Please try again.');
                    return;
                }

                // ── 6. Navigate ─────────────────────────────────────────────
                hideAllAlerts();
                if (role === 'admin') {
                    window.location.replace('admin-dashboard.html');
                } else {
                    window.location.replace('writer-dashboard.html');
                }

            } catch (error) {
                SecureLogger.error('Login error:', error.code);

                // Clean up any partial auth state
                try { await signOut(auth); } catch (_) {}
                SecureSession.clearSession();

                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/invalid-credential':
                    case 'auth/invalid-login-credentials':
                    case 'auth/wrong-password':
                        showBanner(
                            'Sign In Failed',
                            'Incorrect email or password. Please check your details and try again.'
                        );
                        break;
                    case 'auth/too-many-requests':
                        showError('Too many failed attempts. Please wait a few minutes.');
                        break;
                    case 'auth/network-request-failed':
                        showError('Network error. Please check your internet connection.');
                        break;
                    case 'auth/user-disabled':
                        showError('This account has been disabled. Please contact support.');
                        break;
                    default:
                        showError('Sign in failed. Please try again or contact support.');
                        break;
                }
            } finally {
                _loginInProgress     = false;
                loginBtn.disabled    = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
